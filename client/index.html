<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎓 Student Management System</h1>
  </header>

  <main>
    <!-- Form -->
    <section class="form-section">
      <h2 id="form-title">Add New Student</h2>
      <form id="student-form">
        <input type="hidden" id="student-id" />
        <div class="form-grid">
          <input type="text" id="firstName" placeholder="First Name" required />
          <input type="text" id="lastName" placeholder="Last Name" required />
          <input type="email" id="email" placeholder="Email" required />
          <input type="text" id="course" placeholder="Course" required />
          <input type="number" id="year" placeholder="Year (1-5)" min="1" max="5" required />
          <input type="number" id="gpa" placeholder="GPA (0.0-4.0)" step="0.1" min="0" max="4" />
          <input type="text" id="phone" placeholder="Phone" />
          <select id="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="graduated">Graduated</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" id="submit-btn">➕ Add Student</button>
          <button type="button" id="cancel-btn" style="display:none">✖ Cancel</button>
        </div>
      </form>
    </section>

    <!-- Search -->
    <section class="search-section">
      <input type="text" id="search-input" placeholder="🔍 Search by name, course or email..." />
    </section>

    <!-- Stats -->
    <section class="stats-section" id="stats"></section>

    <!-- Table -->
    <section class="table-section">
      <h2>All Students</h2>
      <div id="table-container">
        <table id="student-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Course</th>
              <th>Year</th>
              <th>GPA</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="student-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
